#@TYPE: Machine
#@NAME: petalinuxbsp.conf

# Opsero Electronic Design Inc.
# Force-install the PCS/PMA isolate-clear boot service (recipes-apps/pcs-unisolate).
# This is a stop-gap: the PL PCS/PMA cores power up ISOLATED and Linux has no
# owner for them in this kernel. Remove this line and the recipe when the kernel
# can manage the PCS via device tree (pcs-handle + an "xlnx,pcs" node). See
# docs/source/advanced.md.
IMAGE_INSTALL:append = " pcs-unisolate"
